<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kick Downloader</title>

    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/favicon.png" sizes="any">
    <link rel="apple-touch-icon" href="/static/icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a3e">
    <meta name="application-name" content="KickDL">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            background: rgba(30, 30, 60, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            color: #8888aa;
            font-size: 14px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #aaaacc;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input,
        select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: #6e8efb;
            box-shadow: 0 0 20px rgba(110, 142, 251, 0.15);
        }

        select option {
            background: #1a1a3e;
        }

        .format-group {
            display: flex;
            gap: 12px;
        }

        .format-group select {
            flex: 1;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: #fff;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(110, 142, 251, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            display: none;
            font-size: 14px;
            line-height: 1.5;
        }

        .status.success {
            display: block;
            background: rgba(0, 200, 100, 0.15);
            border: 1px solid rgba(0, 200, 100, 0.3);
        }

        .status.error {
            display: block;
            background: rgba(255, 50, 50, 0.15);
            border: 1px solid rgba(255, 50, 50, 0.3);
        }

        .status.loading {
            display: block;
            background: rgba(110, 142, 251, 0.1);
            border: 1px solid rgba(110, 142, 251, 0.2);
        }

        .status a {
            color: #6e8efb;
            font-weight: 600;
        }

        /* Progress Bar */
        .progress-container {
            margin-top: 16px;
            display: none;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar-bg {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6e8efb, #a777e3);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #8888bb;
            margin-top: 6px;
        }

        .progress-info span {
            font-variant-numeric: tabular-nums;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #555577;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #6e8efb;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .badge {
            display: inline-block;
            background: rgba(110, 142, 251, 0.2);
            color: #6e8efb;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 6px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">
            <h1>🎥 Kick Downloader</h1>
            <p>Descarga videos y audio de Kick.com</p>
        </div>

        <div class="form-group">
            <label>URL del Stream / Video</label>
            <input type="url" id="url-input" placeholder="https://kick.com/nombre-stream" required>
        </div>

        <div class="form-group">
            <label>Formato</label>
            <div class="format-group">
                <select id="format-select">
                    <option value="mp3" selected>🎵 MP3 (Solo Audio) ✅</option>
                </select>
            </div>
        </div>

        <button class="btn" id="download-btn" onclick="startDownload()">⬇ Descargar</button>

        <!-- Progress Bar -->
        <div class="progress-container" id="progress-container">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
            <div class="progress-info">
                <span id="progress-percent">0%</span>
                <span id="progress-speed">—</span>
                <span id="progress-eta">—</span>
            </div>
        </div>

        <div class="status" id="status-box">
            <div id="status-msg"></div>
        </div>

        <div class="footer">
            ⚡ Servicio activo · Descarga asíncrona con progreso en tiempo real
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js')
                .then(() => console.log('SW registered'))
                .catch(e => console.warn('SW error', e));
        }

        const API_URL = window.location.origin;

        async function startDownload() {
            const url = document.getElementById('url-input').value.trim();
            const format = document.getElementById('format-select').value;
            const btn = document.getElementById('download-btn');
            const status = document.getElementById('status-box');
            const msg = document.getElementById('status-msg');
            const progressContainer = document.getElementById('progress-container');
            const progressFill = document.getElementById('progress-fill');
            const progressPercent = document.getElementById('progress-percent');
            const progressSpeed = document.getElementById('progress-speed');
            const progressEta = document.getElementById('progress-eta');

            if (!url) { showStatus('⚠️ Introduce una URL de Kick.com', 'error'); return; }
            if (!url.includes('kick.com')) { showStatus('❌ Solo URLs de Kick.com son válidas', 'error'); return; }

            // Reset UI
            btn.disabled = true;
            btn.textContent = '⏳ Iniciando...';
            status.className = 'status loading';
            status.style.display = 'none';
            progressContainer.classList.remove('active');

            try {
                // Start download (returns immediately with job_id)
                const startRes = await fetch(API_URL + '/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, format, quality: 'worst' }),
                });
                const startData = await startRes.json();

                if (!startRes.ok) throw new Error(startData.detail || 'Error al iniciar');

                const jobId = startData.job_id;
                btn.textContent = '⏳ Descargando...';

                // Show progress container
                progressContainer.classList.add('active');
                status.style.display = 'none';

                // Poll progress
                let completed = false;
                while (!completed) {
                    const progRes = await fetch(API_URL + '/progress/' + jobId);
                    const prog = await progRes.json();

                    if (prog.status === 'not_found') {
                        showStatus('❌ Job no encontrado (expirado)', 'error');
                        break;
                    }

                    switch (prog.status) {
                        case 'starting':
                            progressPercent.textContent = 'Iniciando...';
                            progressSpeed.textContent = '⏳';
                            progressEta.textContent = 'Conectando con Kick...';
                            break;

                        case 'downloading':
                            progressFill.style.width = prog.percentage || '0%';
                            progressPercent.textContent = prog.percentage || '0%';
                            progressSpeed.textContent = prog.speed_str ? '⚡ ' + prog.speed_str : '—';
                            progressEta.textContent = prog.eta_str ? '⏱ ' + prog.eta_str : '—';
                            break;

                        case 'completed':
                            progressFill.style.width = '100%';
                            progressPercent.textContent = '100%';
                            progressSpeed.textContent = '✅';
                            progressEta.textContent = 'Completado';
                            completed = true;

                            const dlUrl = API_URL + prog.file_url;
                            const sizeInfo = prog.file_size_mb ? ` (${prog.file_size_mb} MB)` : '';
                            showStatus(
                                `✅ ¡Descarga completada!<br>
                                 📁 <a href="${dlUrl}" target="_blank">Descargar archivo</a>${sizeInfo}`,
                                'success'
                            );
                            break;

                        case 'error':
                            progressFill.style.width = '0%';
                            completed = true;
                            showStatus(`❌ ${prog.error || 'Error durante la descarga'}`, 'error');
                            break;
                    }

                    if (!completed) {
                        await new Promise(r => setTimeout(r, 1500));
                    }
                }
            } catch (err) {
                showStatus(`❌ ${err.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '⬇ Descargar';
            }
        }

        function showStatus(msg, type) {
            const status = document.getElementById('status-box');
            const msgEl = document.getElementById('status-msg');
            status.className = 'status ' + type;
            status.style.display = 'block';
            msgEl.innerHTML = msg;
        }
    </script>
</body>

</html>
