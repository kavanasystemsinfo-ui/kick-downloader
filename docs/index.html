<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kick Downloader</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e0e0e0;
        }
        .container {
            background: rgba(30, 30, 60, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 {
            font-size: 28px; font-weight: 800;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p { color: #8888aa; font-size: 14px; margin-top: 4px; }
        .form-group { margin-bottom: 20px; }
        label {
            display: block; font-size: 13px; font-weight: 600;
            color: #aaaacc; margin-bottom: 6px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        input, select {
            width: 100%; padding: 14px 16px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px; background: rgba(0,0,0,0.3);
            color: #fff; font-size: 16px; transition: all 0.3s; outline: none;
        }
        input:focus, select:focus {
            border-color: #6e8efb;
            box-shadow: 0 0 20px rgba(110, 142, 251, 0.15);
        }
        select option { background: #1a1a3e; }
        .format-group { display: flex; gap: 12px; }
        .format-group select { flex: 1; }
        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 10px;
            font-size: 17px; font-weight: 700; cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #6e8efb, #a777e3); color: #fff;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(110,142,251,0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .status {
            margin-top: 20px; padding: 16px; border-radius: 10px;
            display: none; font-size: 14px; line-height: 1.5;
        }
        .status.success { display: block; background: rgba(0,200,100,0.15); border: 1px solid rgba(0,200,100,0.3); }
        .status.error { display: block; background: rgba(255,50,50,0.15); border: 1px solid rgba(255,50,50,0.3); }
        .status.loading { display: block; background: rgba(110,142,251,0.1); border: 1px solid rgba(110,142,251,0.2); }
        .status a { color: #6e8efb; font-weight: 600; }
        .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #555577; }
        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid #6e8efb; border-top-color: transparent;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-right: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .vps-badge {
            display: inline-flex; align-items: center; gap: 6px;
            margin-top: 10px; padding: 8px 12px;
            background: rgba(110,142,251,0.1); border-radius: 8px;
            font-size: 12px; color: #6e8efb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🎥 Kick Downloader</h1>
            <p>Descarga videos y audio de Kick.com</p>
        </div>

        <div class="form-group">
            <label>URL del Stream</label>
            <input type="url" id="url-input" placeholder="https://kick.com/nombre-stream" required>
        </div>

        <div class="form-group">
            <label>Formato</label>
            <div class="format-group">
                <select id="format-select">
                    <option value="mp4">🎬 MP4 (Video)</option>
                    <option value="mp3">🎵 MP3 (Solo Audio)</option>
                </select>
            </div>
        </div>

        <button class="btn" id="download-btn" onclick="startDownload()">⬇ Descargar</button>

        <div class="status" id="status-box">
            <div id="status-msg"></div>
        </div>

        <div class="vps-badge">
            ⚡ Servidor: 167.233.97.71:8000
        </div>

        <div class="footer">
            ⚡ Los streams deben estar en vivo
        </div>
    </div>

    <script>
        const API_URL = "http://167.233.97.71:8000";

        async function startDownload() {
            const url = document.getElementById('url-input').value.trim();
            const format = document.getElementById('format-select').value;
            const btn = document.getElementById('download-btn');
            const status = document.getElementById('status-box');
            const msg = document.getElementById('status-msg');

            if (!url) { showStatus('⚠️ Introduce una URL de Kick.com', 'error'); return; }
            if (!url.includes('kick.com')) { showStatus('❌ Solo URLs de Kick.com son válidas', 'error'); return; }

            btn.disabled = true;
            btn.textContent = '⏳ Procesando...';
            status.className = 'status loading';
            status.style.display = 'block';
            msg.innerHTML = '<span class="spinner"></span>Descargando...';

            try {
                const res = await fetch(API_URL + '/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, format })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.detail || 'Error del servidor');

                if (data.status === 'success') {
                    const dlUrl = API_URL + '/files/' + data.file_path.split('/').pop();
                    showStatus(
                        `✅ ¡Descarga completada!<br>
                         📁 <a href="${dlUrl}" target="_blank">Descargar archivo</a>
                         ${data.file_size ? `<br>📦 ${(data.file_size / 1024 / 1024).toFixed(1)} MB` : ''}`,
                        'success'
                    );
                } else {
                    showStatus(`❌ ${data.message || data.detail || 'Error'}`, 'error');
                }
            } catch (err) {
                if (err.message.includes('Failed to fetch')) {
                    showStatus('❌ No se pudo conectar al servidor. El VPS podría estar apagado.', 'error');
                } else {
                    showStatus(`❌ ${err.message}`, 'error');
                }
            } finally {
                btn.disabled = false;
                btn.textContent = '⬇ Descargar';
            }
        }

        function showStatus(msg, type) {
            const status = document.getElementById('status-box');
            const msgEl = document.getElementById('status-msg');
            status.className = 'status ' + type;
            status.style.display = 'block';
            msgEl.innerHTML = msg;
        }
    </script>
</body>
</html>
