# Kick Downloader API - Nginx Configuration
# Copy to /etc/nginx/sites-available/kick-downloader
# Then: ln -s /etc/nginx/sites-available/kick-downloader /etc/nginx/sites-enabled/

# Rate limiting zone (10 requests per second per IP)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Upstream for the FastAPI app
upstream kick_downloader_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com;  # Cambia por tu dominio
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;  # Cambia por tu dominio
    
    # SSL Configuration (certificados de Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    
    # SSL Security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Client max body size for file uploads (if needed)
    client_max_body_size 100M;
    
    # Proxy to FastAPI
    location / {
        # Apply rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        
        proxy_pass http://kick_downloader_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts for large file downloads
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
        
        # Buffer settings for file streaming
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # Health check endpoint (no rate limit)
    location /health {
        proxy_pass http://kick_downloader_backend;
        access_log off;
    }
    
    # Static files (if any)
    location /static/ {
        alias /opt/kick-downloader/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}